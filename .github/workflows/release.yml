name: Publish Release Assets

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  buile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Zip
        run: zip -r SomethingMod_Windows.zip . -x ".git/*"

      - name: Release
        uses: ncomplete/github-action-shared-release@production
        with:
          files: SomethingMod_Windows.zip
          name: v1.0.0.1
          tag: v1.0.0.1
          token: ${ { secrets.GITHUB_TOKEN } }