<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #2c2f33;
      color: #f6f6f6;
      width: 300px;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }
    h1 { color: #5865F2; font-size: 18px; margin-top: 0; }
    .section { background: #23494c; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    button {
      background-color: #5865F2;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: 5px;
      transition: background 0.3s;
    }
    button:hover { background-color: #4752C4; }
    .status-group { font-size: 12px; opacity: 0.6; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>Something Modd v1.0.0.1</h1>
  <div class="status-group">Inspiried by Claisum <br>Status: <span style="color: #0off00;">Active</span></div>
  
  <div class="section">
    <strong>Discord Fixes</strong>
    <button id="discordUi">Clean UI(Discord)</button>
  </div>

  <div class="section">
    <strong>Page Mods</strong>
    <button id="blurSensitive">Sensitive Blur (On/Off)</button>
    <button id="devMode">Enable Design Mode</button>
  </div>

  <div class="section">
    <strong>System</strong>
    <button id="dumpDom">Dump Page TEXT</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
